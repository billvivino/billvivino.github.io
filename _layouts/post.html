---
layout: default
---


<!-- JSON-LD Structured Data for BlogPosting -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ page.url | absolute_url }}"
  },
  "headline": "{{ page.title | escape }}",
  "description": "{{ page.description | escape }}",
  {% if page.categories %}
  "articleSection": "{{ page.categories | join: ', ' }}",
  {% endif %}
  {% if page.tags %}
  "keywords": "{{ page.tags | join: ', ' }}",
  {% endif %}
  {% if page.og_image %}
  "image": ["{{ page.og_image | absolute_url }}"],
  {% endif %}
  "url": "{{ page.url | absolute_url }}",
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.date | date_to_xmlschema }}",
  "author": {
    "@type": "Person",
    "name": "Bill Vivino"
  },
  "publisher": {
    "@type": "Organization",
    "name": "Bill Vivino Technology, LLC",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ '/assets/logo.png' | absolute_url }}"
    }
  }
}
</script>

<style>
  .blog-img-right,
  .blog-img-right img {
    border-radius: 8px;
  }
</style>
<main class="container my-5" style="max-width: 900px;">
  <h1 class="fw-bold">{{ page.title }}</h1>

  <p class="text-muted">
    {{ page.date | date: "%B %d, %Y" }}
  </p>

  <article class="mt-4">
    {{ content }}
  </article>

  <div class="mt-5">
    <a href="/blog.html" class="btn btn-outline-primary">← Back to Blog</a>
  </div>
</main>
